<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>購買｜工事中</title>

<style>
body{
  margin:0;
  background:#0f0c09;
  color:#d6b873;
  font-family:serif;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  overflow:hidden;
}

/* =========================
   テープ揺れアニメーション
========================= */
@keyframes sway{
  0%   { transform: rotate(var(--angle)) translateX(0px); }
  50%  { transform: rotate(calc(var(--angle) + 1deg)) translateX(5px); }
  100% { transform: rotate(var(--angle)) translateX(0px); }
}

.tape{
  position:absolute;
  width:250%;
  height:60px;
  left:-60%;
  background: repeating-linear-gradient(
    45deg,
    rgba(255,220,0,0.18) 0px,
    rgba(255,220,0,0.18) 40px,
    rgba(0,0,0,0.18) 40px,
    rgba(0,0,0,0.18) 80px
  );
  animation: sway 6s ease-in-out infinite;
}

.tape::after{
  content:" 立入禁止  DO NOT ENTER  立入禁止  DO NOT ENTER ";
  position:absolute;
  width:100%;
  top:18px;
  text-align:center;
  font-size:18px;
  letter-spacing:0.3em;
  color:rgba(0,0,0,0.45);
}

.t1{ top:10%; --angle:-12deg; }
.t2{ top:35%; --angle:8deg; }
.t3{ top:65%; --angle:-6deg; }
.t4{ top:85%; --angle:14deg; }

/* =========================
   リアル扉
========================= */
.door{
  position:relative;
  width:280px;
  height:460px;
  background:
    linear-gradient(180deg,#3b2a1a,#2a1b10),
    repeating-linear-gradient(
      90deg,
      rgba(255,255,255,0.03) 0px,
      rgba(255,255,255,0.03) 4px,
      transparent 4px,
      transparent 8px
    );
  border:6px solid #5a3b20;
  box-shadow:
    inset 0 0 40px rgba(0,0,0,0.8),
    0 0 50px rgba(0,0,0,0.9);
}

/* 木目 */
.door::before{
  content:"";
  position:absolute;
  inset:0;
  background:
    repeating-linear-gradient(
      0deg,
      rgba(255,255,255,0.02) 0px,
      rgba(255,255,255,0.02) 3px,
      transparent 3px,
      transparent 6px
    );
  mix-blend-mode:overlay;
}

/* ドアノブ */
.knob{
  position:absolute;
  width:22px;
  height:22px;
  background:radial-gradient(circle at 30% 30%,#e6d39c,#8b6a2f);
  border-radius:50%;
  right:28px;
  top:220px;
  box-shadow:0 0 10px rgba(0,0,0,0.6);
}

/* =========================
   ドアノブ直下の南京錠
========================= */

@keyframes lockSway{
  0%   { transform: rotate(-1deg); }
  50%  { transform: rotate(1deg); }
  100% { transform: rotate(-1deg); }
}

.lock{
  position:absolute;
  width:70px;
  height:85px;

  /* ★ ノブの真下へ移動 */
  right:5px;
  top:245px;

  border-radius:16px;

  background:
    linear-gradient(180deg,#f0e2a6 0%, #c9a84d 40%, #8a6a25 100%);

  box-shadow:
    inset 0 -12px 18px rgba(0,0,0,0.6),
    inset 0 4px 8px rgba(255,255,255,0.3),
    0 10px 18px rgba(0,0,0,0.8);

  animation: lockSway 3.5s ease-in-out infinite;
  transform-origin: top center; /* ★ 上からぶら下がる感じ */
}

/* 弓部分 */
.lock::before{
  content:"";
  position:absolute;
  width:44px;
  height:44px;
  border:10px solid #d8c27a;
  border-bottom:none;
  border-radius:50px 50px 0 0;
  top:-42px;
  left:50%;
  transform:translateX(-50%);
  box-shadow:
    inset 0 4px 6px rgba(255,255,255,0.3),
    0 4px 8px rgba(0,0,0,0.6);
}

/* 鍵穴 */
.lock::after{
  content:"";
  position:absolute;
  width:14px;
  height:24px;
  background:#2a1b10;
  border-radius:7px;
  top:35px;
  left:50%;
  transform:translateX(-50%);
  box-shadow: inset 0 4px 6px rgba(0,0,0,0.8);
}

/* =========================
   ボタン（扉上部）
========================= */
.back-btn{
  position:absolute;
  top:15px;
  left:50%;
  transform:translateX(-50%);
  padding:6px 18px;
  border:1px solid #6b4b2a;
  text-decoration:none;
  color:#d6b873;
  background:rgba(0,0,0,0.4);
}

.back-btn:hover{
  background:#6b4b2a;
  color:#fff;
}

/* メッセージ */
.message{
  position:absolute;
  bottom:-130px;
  width:100%;
  text-align:center;
}

.message h1{
  font-size:1.7rem;
  letter-spacing:0.25em;
}
</style>
</head>

<body>

<div class="tape t1"></div>
<div class="tape t2"></div>
<div class="tape t3"></div>
<div class="tape t4"></div>

<div class="door">
  <a href="index.html" class="back-btn">受付へ戻る</a>

  <div class="knob"></div>
  <div class="lock"></div>

  <div class="message">
    <h1>現在工事中です</h1>
    <p>司書以外立入禁止</p>
  </div>
</div>

</body>

</html>
