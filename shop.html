<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>購買｜正岡式としょんか</title>
<link rel="icon" type="image/png" href="favicon.png">
<link rel="stylesheet" href="common.css">

<style>
  
body{
    padding-top:60px;
    background:#120b06;
    color:#e6d8b8;
    font-family:"Yu Mincho","Hiragino Mincho ProN",serif;
}



h1{
    text-align:center;
    margin-bottom:30px;
    letter-spacing:0.2em;
}

.section{
    border-top:1px solid #6b4b2a;
    padding-top:20px;
    margin-top:30px;
}

.section h2{
    color:#d6b873;
    margin-bottom:12px;
}

ul{
    padding-left:20px;
}

li{
    margin-bottom:6px;
}
.container{
  display:grid;
  grid-template-columns:220px 1fr 320px;
  height:100vh;
}
.sidebar{
  background:#1a120a;
  padding:15px;
  border-right:1px solid #6b4b2a;
}
.category{
  padding:10px;
  border:1px solid #6b4b2a;
  margin-bottom:8px;
  cursor:pointer;
}
.category:hover{ background:#3b2a1a; }
.main{ padding:15px; overflow-y:auto; }
.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:12px;
}
.item{
  background:#f4ecd8;
  color:#000;
  border:2px solid #8a6a3c;
  padding:10px;
  cursor:pointer;
  position:relative;
}
.item.selected{ outline:3px solid gold; }
.tooltip{
  position:absolute;
  bottom:100%;
  left:0;
  background:#000;
  color:#fff;
  padding:5px;
  font-size:12px;
  display:none;
}
.item:hover .tooltip{ display:block; }

.cart{
  background:#1a140e;
  padding:15px;
  border-left:1px solid #6b4b2a;

  display: flex;
  flex-direction: column;
}
.cart-item{
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid #6b4b2a;
  padding:6px 0;
}
.qty-btn{
  background:#3b2a1a;
  color:#d6b873;
  border:1px solid #6b4b2a;
  padding:2px 6px;
  cursor:pointer;
}
button{
  width:100%;
  margin-top:10px;
  padding:8px;
  background:#3b2a1a;
  color:#d6b873;
  border:1px solid #6b4b2a;
  cursor:pointer;
}
/* ===== フォーム ===== */

.form-row{
    display:flex;
    flex-direction:column;
    margin-bottom:14px;
}

.form-row label{
    color:#d6b873;
    margin-bottom:4px;
}

input, textarea{
    background:#2a1a10;
    border:1px solid #6b4b2a;
    color:#e6d8b8;
    padding:6px;
    border-radius:6px;
}

input:focus, textarea:focus{
    outline:none;
    border-color:#d6b873;
}

form button{
    background:#7a5a2e;
    color:#fff;
    border:none;
    padding:8px 18px;
    border-radius:6px;
    cursor:pointer;
}

form button:hover{
    background:#9a7740;
}

</style>
</head>

<body>
  
<div class="top-white-bar">
リンバスTRPG　正岡式としょんか
</div>

<nav class="global-nav">
  <a href="index.html">受付</a>
  <a href="database.html">資料室</a>
  <a href="trial.html">試用室</a>
  <a href="shop.html" class="active">購買</a>
  <a href="workshop.html">基礎室</a>
  <a href="help.html">案内板</a>
</nav>

<div class="help-wrapper">
<div class="container">

<div class="sidebar">
  <h3>分類</h3>
  <div id="categoryList"></div>
  <button onclick="resetAll()">全リセット</button>
</div>

<div class="main">
  <div class="grid" id="shop"></div>
</div>

<div class="cart">
  <h3>選択</h3>
  <div id="cartList"></div>
  <div id="total"></div>
  <button onclick="copyResult()">コピー</button>
</div>

</div>

<script>
const TYPE_ORDER=["identity","ego","suppassive","mental","strengthening","item"];
const TYPE_LABEL={
  identity:"人格", ego:"E.G.O", suppassive:"サポートパッシブ",
  mental:"精神", strengthening:"身体強化", item:"アイテム", all:"すべて"
};

let ITEM_DB=[], cart=[], currentCategory="all";

/* 初期化 */
async function init(){
  const res=await fetch("./data/shop.tsv");
  const text=await res.text();
  ITEM_DB=parseTSV(text);
  load();
  renderCategories();
  renderShop();
  updateCart();
}

/* TSV */
function parseTSV(tsv){
  const l=tsv.trim().split("\n");
  const h=l[0].split("\t");
  return l.slice(1).map((line,i)=>{
    const v=line.split("\t"); let r={};
    h.forEach((k,j)=>r[k]=v[j]);
    return {id:i,name:r["名称"],price:+r["値段"],unit:r["単位"],type:r["分類"],desc:r["概要"],source:r["出展"]};
  });
}

/* カテゴリ */
function renderCategories(){
  categoryList.innerHTML="";
  const types=["all",...TYPE_ORDER.filter(t=>ITEM_DB.some(i=>i.type===t))];
  types.forEach(t=>{
    const d=document.createElement("div");
    d.className="category";
    d.textContent=TYPE_LABEL[t]||t;
    d.onclick=()=>{currentCategory=t;renderShop();};
    categoryList.appendChild(d);
  });
}

/* 商品 */
function renderShop(){
  shop.innerHTML="";
  ITEM_DB
    .slice().sort((a,b)=>TYPE_ORDER.indexOf(a.type)-TYPE_ORDER.indexOf(b.type))
    .filter(i=>currentCategory==="all"||i.type===currentCategory)
    .forEach(item=>{
      const div=document.createElement("div");
      div.className="item";
      const inCart=cart.find(c=>c.id===item.id);
      if(inCart) div.classList.add("selected");
      div.innerHTML=`
        <div class="tooltip">概要：${item.desc}<br>出展：${item.source}</div>
        <b>${item.name}</b><br>
        ${item.price}${item.unit}${inCart?.qty?" ×"+inCart.qty:""}
      `;
      div.onclick=()=>toggle(item);
      shop.appendChild(div);
    });
}

/* 追加 */
function toggle(item){
  const f=cart.find(i=>i.id===item.id);
  if(item.type==="item"){
    if(f) f.qty++; else cart.push({...item,qty:1});
  }else{
    if(f) cart=cart.filter(i=>i.id!==item.id);
    else cart.push({...item});
  }
  save(); renderShop(); updateCart();
}

/* ＋ − */
function addQty(id){
  const i=cart.find(x=>x.id===id); if(i){i.qty++;save();updateCart();renderShop();}
}
function subQty(id){
  const i=cart.find(x=>x.id===id);
  if(!i) return;
  if(i.qty>1) i.qty--;
  else cart=cart.filter(x=>x.id!==id);
  save(); updateCart(); renderShop();
}

/* 合計 */
function calcTotal(){
  const t={};
  cart.forEach(i=>{
    const q=i.qty||1;
    t[i.unit]=(t[i.unit]||0)+i.price*q;
  });
  return t;
}

/* 表示 */
function updateCart(){
  cartList.innerHTML="";
  cart.forEach(i=>{
    const q=i.qty||1;
    const d=document.createElement("div");
    d.className="cart-item";

    if(i.type==="item"){
      d.innerHTML=`
        ${i.name} ${i.price*q}${i.unit}
        <span>
          <button class="qty-btn" onclick="subQty(${i.id})">−</button>
          ${q}
          <button class="qty-btn" onclick="addQty(${i.id})">＋</button>
        </span>
      `;
    }else{
      d.innerHTML=`${i.name} ${i.price}${i.unit}
        <button class="qty-btn" onclick="subQty(${i.id})">×</button>`;
    }
    cartList.appendChild(d);
  });

  const t=calcTotal();
  total.innerHTML="";
  Object.keys(t).forEach(u=>{
    const d=document.createElement("div");
    d.textContent=`${u} 合計：${t[u]}`;
    total.appendChild(d);
  });
}

/* コピー */
function copyResult(){
  let txt="";
  cart.forEach(i=>{
    const q=i.qty||1;
    txt+=`${i.name}\t${i.price}×${q}${i.unit}\n`;
  });
  txt+="\n【合計】\n";
  const t=calcTotal();
  Object.keys(t).forEach(u=>txt+=`${u}\t${t[u]}\n`);
  navigator.clipboard.writeText(txt);
  alert("コピーしました");
}

function save(){localStorage.setItem("cart",JSON.stringify(cart));}
function load(){const d=localStorage.getItem("cart"); if(d) cart=JSON.parse(d);}
function resetAll(){cart=[];localStorage.clear();renderShop();updateCart();}

init();
</script>
</body>
</html>
