<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>購買｜正岡式としょんか</title>

<style>
/* ===== 共通 ===== */
*, *::before, *::after{
  box-sizing: border-box;
}

body{
  margin:0;
  padding-top:60px;
  background:#120b06;
  color:#e6d8b8;
  font-family:"Yu Mincho","Hiragino Mincho ProN",serif;
}

.container{
  display:grid;
  grid-template-columns:220px 1fr 320px;
  height: calc(100vh - 60px);
}

/* ===== 左 ===== */
.sidebar{
  background:#1a120a;
  padding:15px;
  border-right:1px solid #6b4b2a;
}
.category{
  padding:10px;
  border:1px solid #6b4b2a;
  margin-bottom:8px;
  cursor:pointer;
}
.category:hover{ background:#3b2a1a; }

/* ===== 中央 ===== */
.main{
  padding:15px;
  overflow-y:auto;
}
.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:12px;
}
.item{
  background:#f4ecd8;
  color:#000;
  border:2px solid #8a6a3c;
  padding:10px;
  cursor:pointer;
  position:relative;
}
.item.selected{ outline:3px solid gold; }
.tooltip{
  position:absolute;
  bottom:100%;
  left:0;
  background:#000;
  color:#fff;
  padding:6px;
  font-size:12px;
  display:none;
  white-space:nowrap;
}
.item:hover .tooltip{ display:block; }

/* ===== 右（スクロール対応） ===== */
.cart{
  background:#1a140e;
  padding:15px;
  border-left:1px solid #6b4b2a;

  display:flex;
  flex-direction:column;
  height:100%;
}

#cartList{
  flex:1;
  overflow-y:auto;
  min-height:0;
}

.cart-item{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:6px;
  border-bottom:1px solid #6b4b2a;
  padding:6px 0;
  white-space:nowrap;
  overflow:hidden;
}

.qty-control{
  display:flex;
  align-items:center;
  gap:4px;
  flex-shrink:0;
}

.qty-btn{
  width:22px;
  height:22px;
  background:#3b2a1a;
  color:#d6b873;
  border:1px solid #6b4b2a;
  padding:0;
  cursor:pointer;
}

#total{
  margin-top:10px;
  padding-top:10px;
  border-top:1px solid #6b4b2a;
  flex-shrink:0;
}

.cart button.copy{
  margin-top:10px;
  padding:8px;
  background:#3b2a1a;
  color:#d6b873;
  border:1px solid #6b4b2a;
  cursor:pointer;
  flex-shrink:0;
}
</style>
</head>

<body>

<div class="container">

<!-- 左 -->
<div class="sidebar">
  <h3>分類</h3>
  <div id="categoryList"></div>
  <button onclick="resetAll()">全リセット</button>
</div>

<!-- 中央 -->
<div class="main">
  <div class="grid" id="shop"></div>
</div>

<!-- 右 -->
<div class="cart">
  <h3>選択</h3>
  <div id="cartList"></div>
  <div id="total"></div>
  <button class="copy" onclick="copyResult()">コピー</button>
</div>

</div>

<script>
/* ===== 設定 ===== */
const TYPE_ORDER=["identity","ego","suppassive","mental","strengthening","item"];
const TYPE_LABEL={
  identity:"人格", ego:"E.G.O", suppassive:"サポートパッシブ",
  mental:"精神", strengthening:"身体強化", item:"アイテム", all:"すべて"
};

let ITEM_DB=[], cart=[], currentCategory="all";

/* ===== 初期化 ===== */
async function init(){
  const res=await fetch("./data/shop.tsv");
  const text=await res.text();
  ITEM_DB=parseTSV(text);
  load();
  renderCategories();
  renderShop();
  updateCart();
}

/* ===== TSV ===== */
function parseTSV(tsv){
  const lines=tsv.trim().split("\n");
  const headers=lines[0].split("\t");
  return lines.slice(1).map((line,i)=>{
    const v=line.split("\t"), r={};
    headers.forEach((h,j)=>r[h]=v[j]);
    return {
      id:i,
      name:r["名称"],
      price:+r["値段"],
      unit:r["単位"],
      type:r["分類"],
      desc:r["概要"],
      source:r["出展"]
    };
  });
}

/* ===== カテゴリ ===== */
function renderCategories(){
  categoryList.innerHTML="";
  const types=["all",...TYPE_ORDER.filter(t=>ITEM_DB.some(i=>i.type===t))];
  types.forEach(t=>{
    const d=document.createElement("div");
    d.className="category";
    d.textContent=TYPE_LABEL[t]||t;
    d.onclick=()=>{currentCategory=t;renderShop();};
    categoryList.appendChild(d);
  });
}

/* ===== 商品 ===== */
function renderShop(){
  shop.innerHTML="";
  ITEM_DB
    .slice()
    .sort((a,b)=>TYPE_ORDER.indexOf(a.type)-TYPE_ORDER.indexOf(b.type))
    .filter(i=>currentCategory==="all"||i.type===currentCategory)
    .forEach(item=>{
      const div=document.createElement("div");
      div.className="item";
      const f=cart.find(c=>c.id===item.id);
      if(f) div.classList.add("selected");
      div.innerHTML=`
        <div class="tooltip">概要：${item.desc}<br>出展：${item.source}</div>
        <b>${item.name}</b><br>
        ${item.price}${item.unit}${f?.qty?" ×"+f.qty:""}
      `;
      div.onclick=()=>toggle(item);
      shop.appendChild(div);
    });
}

/* ===== カート操作 ===== */
function toggle(item){
  const f=cart.find(i=>i.id===item.id);
  if(item.type==="item"){
    if(f) f.qty++; else cart.push({...item,qty:1});
  }else{
    if(f) cart=cart.filter(i=>i.id!==item.id);
    else cart.push({...item});
  }
  save(); renderShop(); updateCart();
}

function addQty(id){
  const i=cart.find(x=>x.id===id);
  if(i){i.qty++; save(); renderShop(); updateCart();}
}
function subQty(id){
  const i=cart.find(x=>x.id===id);
  if(!i) return;
  if(i.qty>1) i.qty--;
  else cart=cart.filter(x=>x.id!==id);
  save(); renderShop(); updateCart();
}

/* ===== 合計 ===== */
function calcTotal(){
  const t={};
  cart.forEach(i=>{
    const q=i.qty||1;
    t[i.unit]=(t[i.unit]||0)+i.price*q;
  });
  return t;
}

function updateCart(){
  cartList.innerHTML="";
  cart.forEach(i=>{
    const q=i.qty||1;
    const d=document.createElement("div");
    d.className="cart-item";
    if(i.type==="item"){
      d.innerHTML=`
        <span>${i.name} ${i.price*q}${i.unit}</span>
        <span class="qty-control">
          <button class="qty-btn" onclick="subQty(${i.id})">−</button>
          ${q}
          <button class="qty-btn" onclick="addQty(${i.id})">＋</button>
        </span>
      `;
    }else{
      d.innerHTML=`<span>${i.name} ${i.price}${i.unit}</span>`;
    }
    cartList.appendChild(d);
  });

  const t=calcTotal();
  total.innerHTML="";
  Object.keys(t).forEach(u=>{
    const d=document.createElement("div");
    d.textContent=`${u} 合計：${t[u]}`;
    total.appendChild(d);
  });
}

/* ===== その他 ===== */
function copyResult(){
  let txt="";
  cart.forEach(i=>{
    const q=i.qty||1;
    txt+=`${i.name}\t${i.price}×${q}${i.unit}\n`;
  });
  txt+="\n【合計】\n";
  const t=calcTotal();
  Object.keys(t).forEach(u=>txt+=`${u}\t${t[u]}\n`);
  navigator.clipboard.writeText(txt);
  alert("コピーしました");
}

function save(){ localStorage.setItem("cart",JSON.stringify(cart)); }
function load(){ const d=localStorage.getItem("cart"); if(d) cart=JSON.parse(d); }
function resetAll(){ cart=[]; localStorage.clear(); renderShop(); updateCart(); }

init();
</script>
</body>
</html>
