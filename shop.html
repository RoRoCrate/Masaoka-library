<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>購買ツール</title>

<style>
body{
  margin:0;
  background:#0a0705;
  font-family:serif;
  color:#d6b873;
}
.container{
  display:grid;
  grid-template-columns:220px 1fr 280px;
  height:100vh;
}
.sidebar{
  background:#1a120a;
  padding:15px;
  border-right:1px solid #6b4b2a;
}
.category{
  padding:10px;
  border:1px solid #6b4b2a;
  margin-bottom:8px;
  cursor:pointer;
}
.category:hover{
  background:#3b2a1a;
}
.main{
  padding:15px;
  overflow-y:auto;
}
.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:12px;
}
.item{
  background:#f4ecd8;
  color:#000;
  border:2px solid #8a6a3c;
  padding:10px;
  cursor:pointer;
  position:relative;
}
.item.selected{
  outline:3px solid gold;
}
.tooltip{
  position:absolute;
  bottom:100%;
  left:0;
  background:#000;
  color:#fff;
  padding:5px;
  font-size:12px;
  display:none;
}
.item:hover .tooltip{
  display:block;
}
.cart{
  background:#1a140e;
  padding:15px;
  border-left:1px solid #6b4b2a;
}
.cart-item{
  display:flex;
  justify-content:space-between;
  border-bottom:1px solid #6b4b2a;
  padding:5px 0;
}
button{
  width:100%;
  margin-top:10px;
  padding:8px;
  background:#3b2a1a;
  color:#d6b873;
  border:1px solid #6b4b2a;
  cursor:pointer;
}
</style>
</head>

<body>
<div class="container">

<!-- 左 -->
<div class="sidebar">
  <h3>分類</h3>
  <div id="categoryList"></div>
  <button onclick="resetAll()">全リセット</button>
</div>

<!-- 中央 -->
<div class="main">
  <div class="grid" id="shop"></div>
</div>

<!-- 右 -->
<div class="cart">
  <h3>選択</h3>
  <div id="cartList"></div>
  <div>合計：<span id="total"></span></div>
  <button onclick="copyResult()">コピー</button>
</div>

</div>

<script>
/* ===== 設定 ===== */
const TYPE_ORDER = [
  "identity",
  "ego",
  "suppassive",
  "mental",
  "strengthening",
  "item"
];

const TYPE_LABEL = {
  identity: "人格",
  ego: "E.G.O",
  suppassive: "サポートパッシブ",
  mental: "精神",
  strengthening: "身体強化",
  item: "アイテム",
  all: "すべて"
};

let ITEM_DB = [];
let cart = [];
let currentCategory = "all";

/* ===== 初期化 ===== */
async function init(){
  const res = await fetch("./data/shop.tsv");
  const text = await res.text();
  ITEM_DB = parseTSV(text);
  load();
  renderCategories();
  renderShop();
  updateCart();
}

/* ===== TSVパース ===== */
function parseTSV(tsv){
  const lines = tsv.trim().split("\n");
  const headers = lines[0].split("\t");

  return lines.slice(1).map((line, i) => {
    const values = line.split("\t");
    let row = { id: i };

    headers.forEach((h, idx) => {
      row[h] = values[idx];
    });

    return {
      id: i,
      name: row["名称"],
      price: Number(row["値段"]),
      unit: row["単位"],
      type: row["分類"],
      source: row["出展"]
    };
  });
}

/* ===== カテゴリ ===== */
function renderCategories(){
  categoryList.innerHTML = "";
  const types = ["all", ...TYPE_ORDER.filter(t =>
    ITEM_DB.some(i => i.type === t)
  )];

  types.forEach(t=>{
    const div = document.createElement("div");
    div.className = "category";
    div.textContent = TYPE_LABEL[t] || t;
    div.onclick = ()=>{
      currentCategory = t;
      renderShop();
    };
    categoryList.appendChild(div);
  });
}

/* ===== 商品表示 ===== */
function renderShop(){
  shop.innerHTML = "";
  ITEM_DB
    .slice()
    .sort((a,b)=>TYPE_ORDER.indexOf(a.type)-TYPE_ORDER.indexOf(b.type))
    .filter(i=>currentCategory==="all"||i.type===currentCategory)
    .forEach(item=>{
      const div=document.createElement("div");
      div.className="item";
      if(cart.find(c=>c.id===item.id)) div.classList.add("selected");

      div.innerHTML=`
        <div class="tooltip">${item.desc}</div>
        <b>${item.name}</b><br>
        ￥${item.price}
      `;
      div.onclick=()=>toggle(item);
      shop.appendChild(div);
    });
}

/* ===== カート ===== */
function toggle(item){
  const i = cart.findIndex(c=>c.id===item.id);
  if(i>=0) cart.splice(i,1);
  else cart.push(item);
  save();
  renderShop();
  updateCart();
}

function updateCart(){
  cartList.innerHTML="";
  cart.forEach(i=>{
    const d=document.createElement("div");
    d.className="cart-item";
    d.innerHTML=`
      ${i.name} ￥${i.price}
      <button onclick="removeItem(${i.id})">×</button>
    `;
    cartList.appendChild(d);
  });
  total.textContent = cart.reduce((a,b)=>a+b.price,0);
}

/* ===== その他 ===== */
function removeItem(id){
  cart = cart.filter(i=>i.id!==id);
  save();
  renderShop();
  updateCart();
}

function copyResult(){
  let text="";
  cart.forEach(i=>text+=`${i.name}\t${i.price}\n`);
  text+=`合計\t${cart.reduce((a,b)=>a+b.price,0)}`;
  navigator.clipboard.writeText(text);
  alert("コピーしました");
}

function save(){ localStorage.setItem("cart",JSON.stringify(cart)); }
function load(){ const d=localStorage.getItem("cart"); if(d) cart=JSON.parse(d); }
function resetAll(){
  cart=[];
  localStorage.clear();
  renderShop();
  updateCart();
}

init();
</script>
</body>
</html>
